<!DOCTYPE html>
<html>
<body>

<h1>Finding your location...</h1>

<script>
fetch("https://ipwho.is/")
  .then(response => response.json())
  .then(data => {
    console.log(data);

    document.body.innerHTML += `
      <h2>Location</h2>
      Country: ${data.country}<br>
      State: ${data.region}<br>
      City: ${data.city}<br>
      IP: ${data.ip}
    `;
  });
</script>

</body>
</html>
